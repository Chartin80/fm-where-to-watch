name: Scrape Where to Watch

on:
  # Every 48h at 11:00 UTC (07:00 ET).
  schedule:
    - cron: '0 11 */2 * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: where-to-watch-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run scraper
        run: npm run scrape

      - name: Commit JSON
        run: |
          git config user.name  "fm-bot"
          git config user.email "bot@futbolmundial.com"
          git add dist/where-to-watch.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore(where-to-watch): refresh schedule [skip ci]"
            git push
          fi
